volumes:
  db_storage:
  n8n_storage:

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_BROKER_LOG_LEVEL=debug
      - N8N_NATIVE_PYTHON_RUNNER=true
      # Runners Configuration
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_BROKER_PORT=5679
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      - N8N_RUNNERS_STDLIB_ALLOW=*
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:5678/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n-network

  runners:
    build:
      context: .
      dockerfile: Dockerfile.runners
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    volumes:
      - ./hh_cookies.json:/app/hh_cookies.json:ro
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json:ro
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_LAUNCHER_LOG_LEVEL=debug
      - N8N_RUNNERS_HEALTH_CHECK_SERVER_ENABLED=true
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      - N8N_RUNNERS_STDLIB_ALLOW=*
    networks:
      - n8n-network

networks:
  n8n-network:
    driver: bridge